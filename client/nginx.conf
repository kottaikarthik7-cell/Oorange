server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # SPA fallback — always serve index.html for unknown paths so React Router works.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Static uploads (posts, avatars) go straight through to the server.
  location /uploads/ {
    proxy_pass http://server:4000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
  }

  # REST API — frontend calls /api/*, server exposes /*
  location /api/ {
    proxy_pass http://server:4000/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Socket.IO — needs upgrade headers for WebSockets.
  location /socket.io/ {
    proxy_pass http://server:4000/socket.io/;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_read_timeout 3600s;
  }
}
